<div class="page">
  <nav class="navbar">
    <h2>Support Ticket Dashboard</h2>
    <div class="user-box">{{ userName }}</div>
  </nav>

  <section class="hero-card">
    <h1>Welcome back 👋</h1>
    <p>Track, manage, and review support tickets from one place.</p>
  </section>

  <section class="stats-grid">
    @for (stat of stats; track stat.label){
      <div class="stat-card">
        <p>{{ stat.label }}</p>
        <h2>{{ stat.value }}</h2>
      </div>
    }
  </section>
</div>
